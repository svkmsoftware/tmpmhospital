name: Deploy UAT

on:
  push:
    branches:
      - uat

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_UAT_USER }}@${{ secrets.SERVER_HOST }} \
            "/home/kwebmaker-tmpmhospital/scripts/deploy.sh"
